<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin webmaster@mrdbid.com
    ServerName mrdbid.com
    ServerAlias www.mrdbid.com
    DocumentRoot /var/www/public_html/mrdbid/public
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    <Directory /var/www/public_html/mrdbid/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/mrdbid.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/mrdbid.com/privkey.pem
</VirtualHost>
</IfModule>
