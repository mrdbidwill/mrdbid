<VirtualHost *:80>
    ServerAdmin webmaster@mrdbid.com
    ServerName mrdbid.com
    ServerAlias www.mrdbid.com
    DocumentRoot /var/www/public_html/mrdbid/public
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    <Directory /var/www/public_html/mrdbid/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
RewriteEngine on
RewriteCond %{SERVER_NAME} =mrdbid.com [OR]
RewriteCond %{SERVER_NAME} =www.mrdbid.com
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
